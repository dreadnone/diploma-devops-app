name: Build and Deploy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

env:
  REGISTRY: cr.yandex/crp54bul7miqfdk5it8q
  IMAGE_NAME: diploma-app

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
           - name: Login to Yandex Container Registry
        run: echo '${{ secrets.YC_SA_KEY }}' | docker login cr.yandex --username json_key --password-stdin
      
      - name: Extract metadata
        id: meta
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.version }} .
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.version }}
          if [[ "${{ steps.meta.outputs.version }}" != "latest" ]]; then
            docker tag $REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.version }} $REGISTRY/$IMAGE_NAME:latest
            docker push $REGISTRY/$IMAGE_NAME:latest
          fi
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Deploy to Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          
          TAG_NAME=${GITHUB_REF#refs/tags/}
          kubectl set image deployment/diploma-app nginx=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG_NAME
          kubectl rollout status deployment/diploma-app --timeout=2m